<div id="page-links-app">
  <div class="card card-stats">
    <div
      class="card-header card-header-primary card-header-icon rtl text-right"
    >
      <span class="card-icon mx-2">
        <i class="fa fa-link"></i>
      </span>

      <span class="h3 mt-3 farsi text-right">لینک ها</span>
    </div>
    <div class="card-body pt-5">
      {% for page_link in links %}
      <a class="mr-2" target="" href="{{page_link.url}}">
        <h6>{{page_link.get_icon_tag|safe}} {{page_link.title}}</h6>
      </a>

      {% endfor %}
    </div>
