<div id="accordion-blogs" class="rtl text-right farsi">
    <div class="card" id="blogs-app">
        <div class="card-header">
            <h5 class="text-center">
                <button class="btn btn-link" data-toggle="collapse" data-target="#collapse-blogs" aria-expanded="true"
                    aria-controls="collapse-blogs">
                    بلاگ ها
                    <span v-if="blogs.length>0">
                        <small class="text-danger mx-2">
                            <span v-text="blogs.length"></span>
                        </small>
                    </span>


                </button>
            </h5>
        </div>

        <div id="collapse-blogs" class="collapse {% if expand_blogs %} show {% endif %}" aria-labelledby="heading-blogs"
            data-parent="#accordion-blogs">



            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                           
                            
                            <th>
                                عنوان
                            </th>
                            <th>
                                نوع
                            </th>
                            <th>
                                اپ
                            </th>
                            <th>
                            </th>
                        </thead>
                        <tbody>
                            <tr v-for="blog in blogs">
                               
                                <td>
                                    <div class="media">
                                        <a :href="blog.get_absolute_url">
                                            <img width="48" class="rounded" :src="blog.thumbnail"> 
                                        </a>
                                        <div class="media-body mr-2">
                                            <a :href="blog.get_absolute_url">
                                                <h5 v-text="blog.title"></h5>
                                            </a>
                                        </div>
                                    </div>
                                   

                                </td> 
                                 <td>
                                        <span  v-text="blog.class_title"></span>
                                </td>
                                <td>
                                        <span  v-text="blog.app_name"></span>
                                </td>
                                
                                <td>
                                    <a target="_blank" :href="blog.get_edit_url" title="ویرایش"
                                        class=" text-warning mx-2">
                                        <i class="fa fa-edit text-warning">
                                        </i>
                                        ویرایش
                                    </a>
                                    <a target="_blank" :href="blog.get_delete_url" title="حذف"
                                        class=" text-danger mx-2">
                                        <i class="fa fa-trash text-danger">
                                        </i>
                                        حذف
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>


</div>
