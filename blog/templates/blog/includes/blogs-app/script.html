<script>
    const all_blogs = JSON.parse(`{{blogs_s|escapejs}}`)

    let blogs_app=new Vue({
        el:"#blogs-app",
        data:{
            new_blog_title:"",
            blogs:all_blogs,
            message:{show:false},
        },
        methods:{
            add_blog:function(){
                let payload={
                    csrfmiddlewaretoken:csrfmiddlewaretoken,
                    title:blogs_app.new_blog_title,
                }
                let url="{% url 'blog:add_blog' %}"
                $.post(url,payload).done(data=>{
                    console.log(data)
                    if(data.result==="SUCCEED"){
                        blogs_app.blogs.push(data.blog)
                        blogs_app.title=""
                        show_message(blogs_app,"موفق",data.message,"success",5000)
                    }

                    if(data.result!="SUCCEED"){ 
                        show_message(blogs_app,"خطا",data.message,"danger",5000)

                    }
                })
            }
        }
    })
</script>
