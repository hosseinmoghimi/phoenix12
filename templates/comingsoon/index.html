<!doctype html>
<html lang="en">
<head>
  {% load static %}
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <meta name="viewport" content="width=device-width" />
    <link href="{% static 'leo/css/font-farsi.css' %}" rel="stylesheet">
    
    <title>
      {{coming_soon_page_title}} </title>
    
    <link href="/static/comingsoon/css/bootstrap.css" rel="stylesheet" />
	<link href="/static/comingsoon/css/coming-sssoon.css" rel="stylesheet" />    
    
    <!--     Fonts     -->
    <!-- <link href="http://netdna.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.css" rel="stylesheet"> -->
  <link href="{% static 'vendor/css/font-awesome.min.css' %}" rel="stylesheet">
    <link href='http://fonts.googleapis.com/css?family=Grand+Hotel' rel='stylesheet' type='text/css'>
  
</head>

<body>
 
<div class="main" style="background-image: url('{{coming_soon_picture.image}}')">

<!--    Change the image source '/images/default.jpg' with your favourite image.     -->
    
    <div class="cover black" data-color="black"></div>
     
<!--   You can change the black color for the filter with those colors: blue, green, red, orange       -->

    <div class="container  farsi">
        <h1 class="logo cursive farsi">
          <small style="color: #fff;">

            {{coming_soon_title}}
          </small>
        </h1>
        <!--  H1 can have 2 designs: "logo" and "logo cursive"           -->
        
        <div class="content">
          {% if coming_soon_subtitle %}
            
          <h4 class="motto farsi"  style="color: #ccc;">{{coming_soon_subtitle}}</h4>
          {% endif %}
          <div class="subscribe">
            {% if coming_soon_text %}
            <h5 class="info-text farsi">
                
              {{coming_soon_text}}
            </h5>
            {% endif %}
                <div class="row">
                    <div class="col-md-4 col-md-offset-4 col-sm6-6 col-sm-offset-3 ">
                        <form class="form-inline" style="direction: rtl;" role="form">
                          <div class="form-group">
                            <label class="sr-only" for="exampleInputEmail2">آدرس ایمیل</label>
                            <input type="email" class="form-control transparent" placeholder="آدرس ایمیل ...">
                          </div>
                          <button type="submit" class="btn btn-danger btn-fill">اطلاع بده</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
      <div class="container text-center farsi"  style="color: #fff;direction: rtl;">
       
             طراحی و پیاده سازی <i class="fa fa-heart heart"></i> : <a href="mailto:hossein.moghimi.ce@gmail.com">hossein.moghimi.ce@gmail.com</a> 
      </div>
    </div>
 </div>
 </body>
   <script src="/static/comingsoon/js/jquery-1.10.2.js" type="text/javascript"></script>
   <script src="/static/comingsoon/js/bootstrap.min.js" type="text/javascript"></script>

</html>
