<script>
    let financial_events_app_financial_events = JSON.parse(`{{financial_events_s|escapejs}}`)
    let financial_events_app = new Vue({
        el:"#financial-events-app",
        data: {
            financial_events: financial_events_app_financial_events,
            search_for:'',
            waiting:false,

        },
        methods: {
             copy_code_to_clipboard:function(code,name){
                copy_to_clipboard(code,name)
                

            },
            filter_by_balance:function(balance){
                if(balance==0){
                this.financial_events = financial_events_app_financial_events.filter(financial_event=> financial_event.balance==0 )
                }
                if(balance==='all'){
                this.financial_events = financial_events_app_financial_events
                }

                if(balance==1){
                this.financial_events = financial_events_app_financial_events.filter(financial_event=> financial_event.balance>0 )
                }

                if(balance==-1){
                this.financial_events = financial_events_app_financial_events.filter(financial_event=> financial_event.balance<0 )
                }

                if(balance==null){
                this.financial_events = financial_events_app_financial_events.filter(financial_event=> financial_event.balance==null )
                }
            },
            filter:function(){
                this.financial_events = financial_events_app_financial_events.filter(financial_event=> financial_event.title.indexOf(this.search_for) > -1 )
            },
            to_price: function (vall) {
                 return  to_price(vall,"")
            },
          
            to_price_colored: function (vall,curr) {
                 return  to_price_colored(vall,curr)
            },
        }
    })
</script>
