

{% if add_financial_document_line_form %}
{% include "accounting/includes/add-financial-document-line-app/script.html" %}
{% endif %}
<script>
    let financial_document_lines = []

</script>
{% if financial_document_lines_s %}
<script>
    financial_document_lines = JSON.parse("{{financial_document_lines_s|escapejs}}")

</script>
{% endif %}
<script>
    let financial_document_lines_ids=[]
    financial_document_lines.forEach(financial_document_line => {
        financial_document_lines_ids.push(financial_document_line.id)
    });
</script>
<script>

    let financial_document_lines_app = new Vue({
        el: "#financial-document-lines-app",
        data: {
            financial_document_lines: financial_document_lines,
            total: { bestankar: 0, bedehkar: 0 },
            financial_document_lines_ids:financial_document_lines_ids,
            financial_document_lines_ids_str:"[]",
        },
        mounted: function () {
            this.calc_total() 
        },
        methods: {
            to_price_colored: vall => to_price_colored(vall),
 
            ready_for_print:function(){
                financial_document_lines_app.financial_document_lines_ids=[]
                this.financial_document_lines.forEach(financial_document_line => {
                    financial_document_lines_app.financial_document_lines_ids.push(financial_document_line.id)
                });
                console.log(financial_document_lines_app.financial_document_lines_ids)
                
                financial_document_lines_app.financial_document_lines_ids=JSON.stringify(financial_document_lines_app.financial_document_lines_ids)
                console.log(financial_document_lines_app.financial_document_lines_ids)
                return financial_document_lines_app.financial_document_lines_ids
            },
            to_price: vall => to_price(vall),

            add_financial_document_line: function (financial_document_line) {
                this.financial_document_lines.push(financial_document_line)
                this.calc_total()
            },
            calc_total: function () {
                this.financial_document_lines_ids=[]
                this.financial_document_lines.forEach(financial_document_line => {
                    this.financial_document_lines_ids.push(financial_document_line.id)
                });
                console.log(this.financial_document_lines_ids)
                this.financial_document_lines_ids_str=JSON.stringify(this.financial_document_lines_ids)
                bestankar = 0
                bedehkar = 0
                this.financial_document_lines.forEach(financial_document_line => {
                    bedehkar += financial_document_line.bedehkar
                    bestankar += financial_document_line.bestankar
                })
                this.total = { bedehkar: bedehkar, bestankar: bestankar }
            },

        },

    })
</script>
