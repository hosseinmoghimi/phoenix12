<div class="card" id="report-app">
  <div class="card-header">
    <h5>گزارش گیری</h5>
  </div>
  <div class="card-body">
    <form  @submit.prevent="get_report()">
      
    <div class="row rtl">
      <div class="col-md-4">
        <div class="form-group">
          <label for="">تاریخ شروع</label>

          <date-picker v-model="start_date"></date-picker>

          <input
            type="text"
            required
            class="form-control"
            v-model="start_date"
          />
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label for="">شناسه حساب</label>

          <input
            type="number"
            class="form-control"
            v-model="account_id"
          />
          <a href="{% url 'accounting:accounts' %}" target="_blank">
            همه حساب ها
          </a>
        </div>
      </div>

      
      <div class="col-md-4">
        <div class="form-group">
          <label for="">کد حساب</label>

          <input
            type="number"
            class="form-control"
            v-model="account_code"
          />
           <a href="{% url 'accounting:accounts' %}" target="_blank">
            همه حساب ها
          </a>
        </div>
      </div>


      <div class="col-md-4">
        <div class="form-group">
          <label for="">سند</label>

          <input
            type="number"
            class="form-control"
            v-model="financial_document_id"
          />
           <a href="{% url 'accounting:financial_documents' %}" target="_blank">
            همه سند ها
          </a>
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label for="">رویداد</label>

          <input
            type="number"
            class="form-control"
            v-model="financial_event_id"
          />

           <a href="{% url 'accounting:financial_events' %}" target="_blank">
            همه رویداد ها
          </a>
        </div>
      </div>

      <div class="col-md-4">
        <button type="submit" class="btn btn-info">
          گزارش بگیر
        </button>
      </div>
      <div class="col-md-4"></div>
    </div>
    </form>
  </div>
</div>
