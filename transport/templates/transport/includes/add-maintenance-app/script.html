<script>
  let add_maintenance_app = new Vue({
    el: "#add-maintenance-app",
    data: {
      title: "",
      kilometer: 0,
      vehicle_id: 0,
      service_man_id: 0,
      description: "",
      maintenance_type: "",
      event_date: current_date,
      event_time: current_time,
      event_datetime: current_datetime,
      waiting: false,
      message: { show: false },
    },

    components: {
      DatePicker: VuePersianDatetimePicker,
    },
    methods: {
      to_price_colored: function (vall) {
        let colorr = "primary";
        if (vall > 0) {
          colorr = "success";
        }

        if (vall < 0) {
          colorr = "danger";
        }

        return `<span class="text-${colorr}">${to_price(
          vall
        )} {{CURRENCY}}</span>`;
      },
      separate: (vall) => to_price(parseInt(vall), ""),

      to_price: function (vall) {
        return to_price(vall) + " {{CURRENCY}}";
      },

      add_maintenance: function () {
        let payload = {
          csrfmiddlewaretoken: csrfmiddlewaretoken,
          title: this.title,
          vehicle_id: this.vehicle_id,
          service_man_id: this.service_man_id,
          maintenance_type: this.maintenance_type,
          description: this.description,
          kilometer: this.kilometer,
          event_datetime: this.event_date + " " + this.event_time,
        };

        console.log(payload);
        let url = "{% url 'transport:add_maintenance' %}";
        let posting = $.post(url, payload);
        posting.done((data) => {
          console.log(data);

          if (data.result === "SUCCEED") {
            add_maintenance_app.title = "";
            show_message(
              add_maintenance_app,
              "موفق",
              data.message,
              "success",
              5000
            );
            if (typeof maintenances_app != "undefined") {
              maintenances_app.maintenances.push(data.maintenance);
            }
          } else {
            show_message(
              add_maintenance_app,
              "خطا",
              data.message,
              "danger",
              5000
            );
          }
        });
      },
    },
  });
</script>
