{% extends "cafe/layout.html" %} {% load static %} {% block content %}
<div class="row rtl farsi">
  <div class="col-6 col-md-3 col-lg-2 text-center my-3">
    <div class="card">
      <div class="card-header">
        <h4>میز</h4>
      </div>
      <div class="card-body">
        <a href="{% url 'cafe:table' pk=table.pk %}">
          <img
            src="{% static 'chef/img/logo.png' %}"
            width="64em"
            class="mb-2"
            alt=""
          />
          <h6 class="text-center">میز {{table.title}}</h6>
          <h4 class="text-center">شماره {{table.table_no}}</h4>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock content %} {% block script %}
<script>

  console.log("name3: {{name3}}");
