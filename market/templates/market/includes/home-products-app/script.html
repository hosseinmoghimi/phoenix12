<script>
    let products_for_home_products_app=JSON.parse("{{products_s|escapejs}}")
    let home_products_app = new Vue({
        el: "#home-products-app",
        data: {
            products: products_for_home_products_app,
            search_for:"",
        },
        methods: {
            filter: () => {
                let search_for = (home_products_app.search_for).toUpperCase()
                console.log(search_for)
                home_products_app.products = products_for_home_products_app.filter(function (product) {
                    let title=(product.title).toUpperCase()
                    
                    if(title.indexOf(search_for) > -1){
                        return true
                    }
                    return false
                })

            },

            to_price: (vall) => {
                return to_price(vall)
            },
            to_price_tuman: (vall) => {
                return to_price(vall/10)
            }
        }
    })
</script>
