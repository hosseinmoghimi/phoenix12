<tr>
  <td>
    <span v-text="cart_item.row"></span>
  </td>
  <td>
    <div class="media">
      <a :href="cart_item.shop.product.get_market_absolute_url">
        <img
          :src="cart_item.shop.product.thumbnail"
          width="64"
          class="rounded"
          alt=""
        />
      </a>

      <div class="media-body mr-2">
        <h6>
          <a :href="cart_item.shop.product.get_market_absolute_url">
            <span v-text="cart_item.shop.product.title"> </span>
          </a>
        </h6>
        <h6>
          <small>
            <a :href="cart_item.shop.supplier.get_absolute_url">
              <span
                v-text="cart_item.shop.supplier.person_account.title"
              >
              </span>
            </a>
          </small>
        </h6>
      </div>
    </div>
  </td>

  <td>
    <button
      type="button"
      class="btn btn-danger"
      @click="change_quantity(cart_item.shop,cart_item.quantity-1)"
      style="border-radius: 0 5px 5px 0"
    >
      -
    </button>
    <button type="button" class="btn btn-light">
        <div class="text-center">
      <span class="farsi" v-text="cart_item.quantity"> </span>
        <span v-text="cart_item.shop.unit_name"> </span>
      </div>
    </button>
    <button
      type="button"
      class="btn btn-success"
      @click="change_quantity(cart_item.shop,cart_item.quantity+1)"
      style="border-radius: 5px 0 0 5px"
    >
      +
    </button>

     
  </td>
<td>
  <div>

    <span v-text="to_price(cart_item.shop.unit_price*(100-cart_item.shop.discount_percentage)/100)"> </span> 
  </div>
  <div v-if="cart_item.shop.discount_percentage>0">
    
        <span v-text="to_price(cart_item.shop.unit_price)" class="text-danger" style="text-decoration: line-through;"> </span> 
 <span class="text-success mr-2" v-text="cart_item.shop.discount_percentage"></span> 
 <span class="text-success">

   %
 </span>
      </div>  
  
</td>
<td>
  <span v-text="to_price(cart_item.shop.unit_price*cart_item.quantity*(100-cart_item.shop.discount_percentage)/100)"></span> 
  <small class="text-muted">
    {{CURRENCY}}

  </small>
</td>
  <td>
    <div>
      <small v-text="cart_item.persian_date_added"> </small>
    </div>
    <div>
      {% if perms.market.change_cartitem %}
      <a target="_blank" :href="cart_item.get_edit_url" title="ویرایش">
        <i class="fa fa-edit text-warning"></i>
      </a>
      {% endif %} {% if perms.market.delete_cartitem %}
      <a target="_blank" :href="cart_item.get_delete_url" title="حذف">
        <i class="fa fa-trash text-danger"></i>
      </a>
      {% endif %}
    </div>
  </td>
</tr>
