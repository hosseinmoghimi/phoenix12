<script>
    let url_import_shops_from_excel="{% url 'market:import_shops_from_excel' %}"
  let import_shops_from_excel_app = new Vue({
    el: "#add-shops-app",
    data: {
      customer_id: 0,
      waiting: false,
      count:100,
      message: { show: false },
    },

    methods: {
      import_shops_from_excel: function () {
        import_shops_from_excel_app.waiting = true;
        let title = this.new_download_title;
        let formData = new FormData();
        let file1 = $("#import-shops-from-excel-form")[0].elements[0].files[0];
        formData.append("file1", file1);
        formData.append("is_open", import_shops_from_excel_app.is_open);
        formData.append("count", import_shops_from_excel_app.count);
        formData.append("csrfmiddlewaretoken", csrfmiddlewaretoken);
        $.ajax({
          url: url_import_shops_from_excel,
          type: "post",
          data: formData,
          contentType: false,
          processData: false,
          success: function (data) {
            import_shops_from_excel_app.waiting = false;

            if (data != 0) {
              console.log(data);
              if (data.result === "SUCCEED") {
                show_message(
                  import_shops_from_excel_app,
                  "موفقیت آمیز",
                  data.message,
                  "success",
                  10000,
                );
                if (typeof shops_app != "undefined") {
                  shops_app.shops = data.shops;
                }
              }
              if (data.result != "SUCCEED") {
                show_message(
                  import_shops_from_excel_app,
                  "خطا",
                  data.message,
                  "danger",
                  10000,
                );
              }
            } else {
            }
          },
        });
      },
    },
  });
</script>
