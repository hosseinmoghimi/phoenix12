<div class="card">
    <div class="card-body">
        <div class="owl-carousel rtl">
        {% for related_product in related_products %}
      <div class="item">
        <img src="{{related_product.image}}" width="64" alt="">
        <h6>
          <a href="{{related_product.get_market_absolute_url}}">
            {{related_product.title}}
          </a>
        </h6>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
