<script>
    let add_shop_app = new Vue({
        el: "#add-shop-app",
        data: {
            unit_name: "عدد",
            unit_price: 0,
            level: "",
            message: { show: false },
            waiting: false,
            start_date: current_date,
            end_date: current_date,
            available: 0,
            coef:1,
            discount_percentage:0,

        },
        components: {
            DatePicker: VuePersianDatetimePicker

        },
        methods: {
            to_price:vll=>to_price(vll),
            add_shop: function () {
                
                if (this.available < 1) {
                    show_message(add_shop_app, "خطا", "موجودی را وارد کنید.", "danger", 5000)
                    return
                }
                if (this.discount_percentage < 0 || this.discount_percentage>100) {
                    show_message(add_shop_app, "خطا", "درصد تخفیف را وارد کنید.", "danger", 5000)
                    return
                }
                if (this.coef < 0  ) {
                    show_message(add_shop_app, "خطا", "ضریب را وارد کنید.", "danger", 5000)
                    return
                }

                if (this.unit_name=="") {
                    show_message(add_shop_app, "خطا", "واحد فروش را وارد کنید.", "danger", 5000)
                    return
                }
                
                if (this.level=="") {
                    show_message(add_shop_app, "خطا", "سطح فروش را وارد کنید.", "danger", 5000)
                    return
                }
                if (this.unit_price < 1) {
                    show_message(add_shop_app, "خطا", "قیمت را وارد کنید.", "danger", 5000)
                    return
                }
                const payload = {
                    csrfmiddlewaretoken: csrfmiddlewaretoken,
                    product_id: parseInt("{{product.id}}"),
                    discount_percentage: parseInt(this.discount_percentage),
                    coef: parseInt(this.coef), 
                    level: this.level,
                    available: this.available,
                    unit_price: this.unit_price,
                    unit_name: this.unit_name,
                    start_date: this.start_date,
                    end_date: this.end_date,
                }
                let url = "{% url 'market:add_shop' %}"
                console.log(payload)
                $.post(url, payload).done(data => {
                    console.log(data)
                    if (data.result === "SUCCEED") {
                        if (typeof shops_app != "undefined") {
                            shops_app.shops.push(data.shop)
                        }
                        if (typeof product_shops_app != "undefined") {
                            product_shops_app.shops.push(data.shop)
                        }
                        show_message(add_shop_app, "موفقیت آمیز", data.message, "success", 5000)
                    }

                    if (data.result != "SUCCEED") {

                        show_message(add_shop_app, "خطا", data.message, "danger", 5000)
                    }

                })
            },

        }
    })
</script>
