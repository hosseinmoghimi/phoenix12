<script>
  let add_warehouse_sheet_labels_app = new Vue({
    el: "#add-warehouse-sheet-label-app",
    data: {
    serial_no: "", 
    description: "", 
    warehouse_sheet_id:parseInt("{{warehouse_sheet.id}}"),
    },

    components: {
      DatePicker: VuePersianDatetimePicker,
    },
    methods: {
       add_warehouse_sheet_label: function () {
        let payload = {
          csrfmiddlewaretoken: csrfmiddlewaretoken,
          serial_no: this.serial_no,
          description: this.description,
          warehouse_sheet_id: this.warehouse_sheet_id,
        };

        console.log(payload);
        let url = "{% url 'warehouse:add_warehouse_sheet_label' %}";
        let posting = $.post(url, payload);
        posting.done((data) => {
          console.log(data);
          if (data.result === "SUCCEED") {
            if (typeof warehouse_sheet_labels_app != "undefined") {
              warehouse_sheet_labels_app.warehouse_sheet_labels.push(data.warehouse_sheet_label);
            }
          }
        });
      },
    },
  });
</script>
