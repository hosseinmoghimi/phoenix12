<div id="accordion-warehouse-sheet-signatures" class="rtl text-right farsi">
  <div class="card" id="warehouse-sheet-signatures-app">
    <div class="card-header">
      <h5 class="text-center">
        <button
          class="btn btn-link"
          data-toggle="collapse"
          data-target="#collapse-warehouse-sheet-signatures"
          aria-expanded="true"
          aria-controls="collapse-warehouse-sheet-signatures"
        >
          امضا های برگه انبار
          <span v-if="warehouse_sheet_signatures.length>0">
            <small class="text-danger mx-2">
              <span v-text="warehouse_sheet_signatures.length"></span>
            </small>
          </span>
        </button>
      </h5>
    </div>

    <div
      id="collapse-warehouse-sheet-signatures"
      class="collapse {% if expand_warehouse_sheet_signatures %} show {% endif %}"
      aria-labelledby="heading-warehouse-sheet-signatures"
      data-parent="#accordion-warehouse-sheet-signatures"
    >
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
               
              <th>پرسنل</th>
              <th>وضعیت</th>
              <th>تاریخ</th> 
              <th>توضیحات</th>
              {% if cscscadwhajxbjNvsa %}
                
              <th>
                
              </th>
              {% endif %}
            </thead>
            <tbody>
              <tr v-for="warehouse_sheet_signature in warehouse_sheet_signatures">
              

                 <td>
                  <div v-for="employee in [warehouse_sheet_signature.employee]">
                  {% include "organization/includes/employee-app/media.html" %}
                                    
                  </div>
                  

                </td>

                 <td>
                  <div>
                        <span :class="'badge badge-'+warehouse_sheet_signature.status_color" v-text="warehouse_sheet_signature.status"></span>             
                  </div>
                  

                </td>


                <td>
                    <span v-text="warehouse_sheet_signature.persian_date_added"></span>
                </td>
                  <td>
                  <div>
                        <span v-text="warehouse_sheet_signature.description"></span>             
                  </div>
                  

                </td>
                {% if sssasdasdsadasdasasc %}
                  <td>
                  <a
                    target="_blank"
                    :href="warehouse_sheet_signature.get_edit_url"
                    title="ویرایش"
                    class="text-warning mx-2"
                  >
                    <i class="fa fa-edit text-warning"> </i>
                    ویرایش
                  </a>
                  <a
                    target="_blank"
                    :href="warehouse_sheet_signature.get_delete_url"
                    title="حذف"
                    class="text-danger mx-2"
                  >
                    <i class="fa fa-trash text-danger"> </i>
                    حذف
                  </a>
                </td> 
                {% endif %}
               
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
