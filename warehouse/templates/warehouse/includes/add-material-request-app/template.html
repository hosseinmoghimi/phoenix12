<div id="accordion-add-material-request" class="rtl text-right farsi">
  <div class="card" id="add-material-request-app">
    <div class="card-header">
      <h5 class="text-center">
        <button
          class="btn btn-link"
          data-toggle="collapse"
          data-target="#collapse-add-material-request"
          aria-expanded="true"
          aria-controls="collapse-add-material-request"
        >
          درخواست متریال جدید
        </button>
      </h5>
    </div>

    <div
      id="collapse-add-material-request"
      class="collapse show"
      aria-labelledby="heading-add-material-request"
      data-parent="#accordion-add-material-request"
    >
      <div class="card-body">
        
        <div class="row rtl">
          <div class="col-4">
            <form @submit.prevent="search()">
            <div class="form-group">
              <label for=""> عنوان کالا </label>
              <input v-model="title" type="text" class="form-control" />
            </div>

            <div class="form-group">
              <label for=""> بارکد کالا </label>
              <input v-model="barcode" type="text" class="form-control" />
            </div>

            <div class="form-group">
              <label for=""> شناسه کالا </label>
              <input v-model="product_id" type="text" class="form-control" />
            </div>
            <div class="my-2">
              <button class="btn btn-info" type="submit">جستجو</button>
            </div>
          </form>
          </div>

          <div class="col-8">
            <div v-for="product in products">
              {% include "accounting/includes/product-app/media.html" %}
              <button class="btn btn-primary" @click="select_item(product)">
                انتخاب
              </button>
            </div>
            <div v-for="invoice_line_item_unit in invoice_line_item_units">
              <button
                class="btn btn-block my-2 btn-success"
                @click="select_invoice_line_item_unit(invoice_line_item_unit)"
                v-text="' هر '+ invoice_line_item_unit.unit_name +' ' +to_price(invoice_line_item_unit.unit_price)+' {{CURRENCY}}'"
              ></button>
            </div>

            <div v-for="product_in_warehouse in product_in_warehouses">
              <button
                class="btn btn-block my-2 btn-success"
                @click="select_product_in_warehouse(product_in_warehouse)"
                v-text=" product_in_warehouse.quantity +' ' +product_in_warehouse.unit_name+'   در' +product_in_warehouse.warehouse.name"
              ></button>
            </div>
          </div>
        </div>

        <div class="row rtl">
          <div class="col-4">
            <div class="form-group">
              <label for=""> عنوان کالا </label>
              <input v-model="title" type="text" class="form-control" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> تعداد </label>
              <input v-model="quantity" type="text" class="form-control" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> واحد </label>
               <select v-model="unit_name" class="form-control">
                  <option v-for="unit_name11 in unit_names" :nalue="unit_name11" v-text="unit_name11"></option>
                </select>
              <input v-model="unit_name" type="text" class="form-control" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> وضعیت کالا</label>
              <select v-model="status" class="form-control">
                 {% for status in invoice_line_statuses %}
                  <option value="{{status}}">{{status}}</option>
                  {% endfor %}
              </select>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> شماره فاکتور </label>
              <input v-model="invoice_id" type="number" class="form-control" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> شناسه انبار </label>
              <select class="form-control" v-model="warehouse_id" >
                  {% for warehouse in warehouses %}
                    
                  <option value="{{warehouse.id}}">{{warehouse.name}}</option>
                  {% endfor %}
                </select>

              <input
                v-model="warehouse_id"
                type="number"
                class="form-control"
              />
            </div>
          </div>
          

          
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> وضعیت برگه انبار</label>
              <select class="form-control" v-model="status" >
                  {% for status in statuses_for_add_warehouse_sheet_app %}
                    
                  <option value="{{status}}">{{status}}</option>
                  {% endfor %}
                </select>

              
            </div>
          </div>
          

          
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> نوع حواله انبار </label>
              <select class="form-control" v-model="type" >
                  {% for type in types_for_add_warehouse_sheet_app %}
                    
                  <option value="{{type}}">{{type}}</option>
                  {% endfor %}
                </select>

            
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> شناسه واحد درخواست کننده </label>
              <select class="form-control" v-model="organizational_unit_id" >
                  {% for organizational_unit in organizational_units %}
                    
                  <option value="{{organizational_unit.id}}">{{organizational_unit.title}}</option>
                  {% endfor %}
                </select>

              <input
                v-model="warehouse_id"
                type="number"
                class="form-control"
              />
            </div>
          </div><div class="col-md-4">
            <div class="form-group">
              <label for=""> قیمت جزء 

                <span v-text="to_price(unit_price)"></span>
                {{CURRENCY}}
              </label>
              <input v-model="unit_price" type="text" class="form-control" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for=""> جهت </label>
              <select v-model="direction" type="text" class="form-control">
                <option selected value="خروج">خروج</option>
                <option value="ورود">ورود</option>
              </select>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for="">ضریب آیتم</label>
              <input type="text" class="form-control" v-model="coef" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for="">ذخیره قیمت در آیتم</label>
              <input type="checkbox" class="form-control" v-model="save" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label for="">قیمت پیش فرض آیتم</label>
              <input
                type="checkbox"
                class="form-control"
                v-model="default_price"
              />
            </div>
          </div>

          <div class="col-md-4">
            <div class="my-2">
              <button class="btn btn-info" @click="add_material_request()">
                افزودن درخواست متریال
              </button>
            </div>
          </div>
          <div class="col-md-12 my-2">

            {% include "utility/includes/message-app/alert.html" %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
